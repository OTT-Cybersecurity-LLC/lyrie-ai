[package]
name = "lyrie-shield"
version = "0.1.0"
edition = "2021"
authors = ["OTT Cybersecurity LLC <dev@lyrie.ai>"]
description = "The cybersecurity engine for Lyrie Agent — real-time threat detection, anti-malware, WAF, and device protection"
license = "MIT"
repository = "https://github.com/lyrie-ai/lyrie-agent"
homepage = "https://lyrie.ai"

[lib]
name = "lyrie_shield"
path = "src/lib.rs"

[[bin]]
name = "lyrie-shield"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
sha2 = "0.10"
walkdir = "2"
notify = "8"
reqwest = { version = "0.12", features = ["json"] }
